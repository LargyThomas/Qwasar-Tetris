<!DOCTYPE html>
<html lang="fr">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel = "stylesheet" href = "css/menu.css">
        <title>Menu - Tetris</title>
    </head>
    <body>
        <audio id="music" src="assets/audio/music/default_track.mp3" autoplay></audio>
        <div class="hud-bar">
            <h1 class="hud-item">Tetris</h1>
        </div>
        <div class="menu-message">
            <h2>Bienvenue dans Tetris !</h2>
            <p>Génrération de textes</p>
        </div>
        <div class="menu-perso">
            <img src="assets/sprites/character/welcome.jpeg" alt="Character" class="character">
        </div>
        <div class="menu-controls">
            <button onclick="redirectModes()" id="game-mode-btn" class="menu-buttons">Mode de jeu</button>
            <button onclick="redirectParameters()" id="parameters-btn" class="menu-buttons">Paramètres</button>
            <button onclick="redirectMusic()" id="music-btn" class="menu-buttons">Musique</button>
        </div>
    </body>
    <footer>
        <button onclick="redirectCredits()" id="credits-btn" class="footer-button">Crédits</button>
        <p class="footer-text">© 2026 Tetris. Tous droits réservés.</p>
    </footer>
    <script src="js/systems/audio.js"></script>
    <script>
        function redirectModes() {
            window.location.href = 'games_modes.html';
        }
        function redirectParameters() {
            window.location.href = 'parameters.html';
        }
        function redirectMusic() {
            window.location.href = 'music.html';
        }
        function redirectCredits() {
            window.location.href = 'credits.html';
        }
    </script>
</html>
